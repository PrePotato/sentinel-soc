# Render blueprint — SENTINEL SOC backend (FastAPI).
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Production runs SIMULATED telemetry only; real Nmap/Scapy scans stay LOCAL.
services:
  - type: web
    name: sentinel-soc-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"

      # ── Production mode: simulated telemetry only ──
      - key: SOC_SCAN_ENABLED
        value: "0"
      - key: SOC_SNIFF_ENABLED
        value: "0"

      # ── Live NVD feed + AI model ──
      - key: SOC_NVD_ENABLED
        value: "1"
      - key: SOC_AI_MODEL
        value: claude-haiku-4-5

      # ── Auth: strong secret auto-generated by Render ──
      - key: SOC_JWT_SECRET
        generateValue: true

      # ── CORS: allow any *.vercel.app origin out of the box ──
      - key: SOC_CORS_ORIGIN_REGEX
        value: 'https://.*\.vercel\.app'

      # ── Set these in the Render dashboard (marked secret) ──
      - key: DATABASE_URL        # Supabase connection string (optional event log)
        sync: false
      - key: ANTHROPIC_API_KEY   # optional — enables live Claude analysis
        sync: false
      - key: SOC_NVD_API_KEY     # optional — raises NVD rate limits
        sync: false
